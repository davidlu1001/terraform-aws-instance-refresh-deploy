name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: fmt check
        run: terraform fmt -check -recursive

  validate:
    name: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - .
          - examples/minimal
          - examples/complete
          - examples/with-external-asg
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: init
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}
      - name: validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0
      - name: init
        run: tflint --init
      - name: lint
        run: tflint --recursive

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck scripts/*.sh
